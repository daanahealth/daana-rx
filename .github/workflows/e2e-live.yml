name: E2E (live)

# Runs the end-to-end + browser specs against the LIVE deployment.
# Manual-only: it hits production (daanahealth-gateway / daanahealth-rx) and
# creates test data — each spec self-provisions its own throwaway clinic
# (e2e_*@daana-test.local), so NO credential secrets are required. Those
# throwaway clinics + their items accumulate and should be purged periodically
# (e.g. delete from public.clinics where name like 'E2E%' and cascade). Not run
# on push, to avoid unattended prod writes.

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      E2E_GATEWAY_URL: https://daanahealth-gateway.onrender.com
      E2E_FRONTEND_URL: https://daanahealth-rx.onrender.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Functional API E2E (every endpoint)
        run: node e2e/functional-api.mjs

      - name: Playwright smoke + user-flow crawl
        run: npx playwright test --config e2e/playwright.config.ts e2e/smoke.spec.ts e2e/user-flow.spec.ts --reporter=list

      - name: Browser flows (check-in+QR label, search, checkout, reports, settings)
        run: npx playwright test --config e2e/playwright.config.ts e2e/all-flows.spec.ts e2e/checkin-flow.spec.ts --reporter=list

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots
          if-no-files-found: ignore

      # Purge the throwaway test data this run created (E2E% clinics, demo items,
      # etc.). Runs even if the tests failed. Calls a scoped, service_role-only
      # SECURITY DEFINER function — needs the SUPABASE_* secrets.
      - name: Clean up E2E test data
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY not set — skipping cleanup"; exit 0
          fi
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/rpc/cleanup_e2e_test_data" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" -d '{}'
