name: autofix

# Auto-applies formatting + safe lint fixes to a PR's CHANGED files and commits
# them back to the PR branch. Scoped to changed files only, so it never triggers
# a repo-wide reformat. Skips PRs from forks (GITHUB_TOKEN can't push there).
on:
  pull_request:

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Collect changed files
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t FILES < <(git diff --name-only --diff-filter=ACMR \
            "origin/${{ github.base_ref }}...HEAD" \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs' '*.cjs' '*.json' '*.css' '*.scss' '*.md' || true)
          printf '%s\n' "${FILES[@]}" | sed '/^$/d' > changed_files.txt
          echo "count=$(wc -l < changed_files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "Changed files:"; cat changed_files.txt

      - name: Apply Prettier + ESLint --fix (changed files only)
        if: steps.changed.outputs.count != '0'
        run: |
          mapfile -t FILES < changed_files.txt
          npx prettier --write "${FILES[@]}" || true
          mapfile -t JS < <(printf '%s\n' "${FILES[@]}" | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
          if [ ${#JS[@]} -gt 0 ]; then npx eslint --fix "${JS[@]}" || true; fi
          rm -f changed_files.txt

      - name: Commit fixes back to the PR
        if: steps.changed.outputs.count != '0'
        run: |
          rm -f changed_files.txt
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: apply automated lint/format fixes"
            git push origin "HEAD:${{ github.head_ref }}"
            echo "✅ Pushed autofix commit."
          else
            echo "✅ Nothing to fix."
          fi
